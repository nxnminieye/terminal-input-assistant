<!DOCTYPE html>
<html lang="{{I18N_HTML_LANG}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'nonce-{{NONCE}}'; script-src 'nonce-{{NONCE}}';"
  />
  <title>{{I18N_HTML_TITLE}}</title>
  <link rel="stylesheet" nonce="{{NONCE}}" href="{{STYLE_URI}}" />
</head>
<body>
  <div class="container">
    <!-- 终端选择栏 -->
    <div class="terminal-bar">
      <select id="terminalSelect" title="{{I18N_SELECT_TITLE}}">
        <option value="__active__">{{I18N_FOLLOW_ACTIVE}}</option>
      </select>
      <button id="lockBtn" class="icon-btn" title="{{I18N_LOCK_UNLOCK_TITLE}}">🔓</button>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
      <textarea
        id="inputBox"
        placeholder="{{I18N_PLACEHOLDER}}"
        rows="4"
        spellcheck="false"
      ></textarea>
    </div>

    <!-- 操作按钮 -->
    <div class="action-bar">
      <button id="sendEnterBtn" class="btn btn-primary">{{I18N_SEND_ENTER_BTN}}</button>
      <button id="sendBtn" class="btn btn-secondary">{{I18N_SEND_BTN}}</button>
      <button id="addHistoryBtn" class="btn btn-secondary">{{I18N_ADD_HISTORY_BTN}}</button>
    </div>

    <!-- 状态提示 -->
    <div id="statusMsg" class="status-msg" aria-live="polite"></div>

    <!-- 历史记录 -->
    <div class="history-section">
      <div class="history-header">{{I18N_HISTORY_HEADER}}</div>
      <ul id="historyList" class="history-list"></ul>
    </div>
  </div>

  {{I18N_SCRIPT}}
  <script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
</body>
</html>
