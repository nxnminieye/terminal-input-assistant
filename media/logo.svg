<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="100%" stop-color="#0A0A0A" />
    </linearGradient>
    
    <!-- Cursor/Input Gradient -->
    <linearGradient id="cursor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007ACC" />
      <stop offset="100%" stop-color="#005A9E" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer Icon Base (Rounded Square) -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bg-grad)" filter="url(#shadow)" />
  <rect x="16" y="16" width="224" height="224" rx="48" fill="none" stroke="#333333" stroke-width="2" />

  <!-- Terminal Header Bar -->
  <path d="M 16 64 C 16 37.49 37.49 16 64 16 L 192 16 C 218.51 16 240 37.49 240 64 L 240 64 L 16 64 Z" fill="#2D2D30" />
  
  <!-- Window Controls -->
  <circle cx="48" cy="40" r="8" fill="#FF5F56" />
  <circle cx="76" cy="40" r="8" fill="#FFBD2E" />
  <circle cx="104" cy="40" r="8" fill="#27C93F" />

  <!-- The Terminal Prompt ">" -->
  <path d="M 56 116 L 88 140 L 56 164" fill="none" stroke="#27C93F" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

  <!-- The Safe Input Buffer / Glowing Cursor -->
  <rect x="112" y="108" width="88" height="64" rx="12" fill="url(#cursor-grad)" />
  <rect x="112" y="108" width="88" height="64" rx="12" fill="none" stroke="#3399FF" stroke-width="2" />

  <!-- A subtle "Text/Typing" visual inside the buffer -->
  <rect x="132" y="128" width="48" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.9" />
  <rect x="132" y="148" width="32" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.5" />

</svg>
